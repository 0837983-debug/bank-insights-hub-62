# Prod deploy:  docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
# Bootstrap:    docker compose -f docker-compose.prod.yml run --rm db-bootstrap
# RDS / external: set DB_HOST in .env, use COMPOSE_PROFILES=external-db (disables bundled postgres)
#
# Requires frontend/Dockerfile (Stage 2 frontend-agent) for full build.

services:
  postgres:
    image: postgres:16-alpine
    container_name: bank-insights-postgres-prod
    profiles:
      - local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-bank_prod_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_prod_password}
      POSTGRES_DB: ${DB_NAME:-bankdb_prod}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-bank_prod_user} -d ${DB_NAME:-bankdb_prod}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    image: ayreon208/bank-insights-backend:${TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bank-insights-backend-prod
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-bankdb_prod}
      DB_USER: ${DB_USER:-bank_prod_user}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_prod_password}
      PORT: 3001
      FRONTEND_URL: http://frontend
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    image: ayreon208/bank-insights-frontend:${TAG:-latest}
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: bank-insights-frontend-prod
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

  db-bootstrap:
    image: ayreon208/bank-insights-backend:${TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bank-insights-db-bootstrap-prod
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-bankdb_prod}
      DB_USER: ${DB_USER:-bank_prod_user}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_prod_password}
      DB_ADMIN_USER: ${DB_ADMIN_USER:-bank_prod_user}
      DB_ADMIN_PASSWORD: ${DB_ADMIN_PASSWORD:-change_me_prod_password}
      BOOTSTRAP_API_URL: http://backend:3001
      DATASET_DIR: /test-data/uploads
    volumes:
      - ./test-data:/test-data:ro
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      backend:
        condition: service_healthy
    command: ["npm", "run", "bootstrap:local-db"]
    restart: "no"

  # Marker service: activates external-db profile without starting bundled postgres
  external-db:
    profiles:
      - external-db
    image: alpine:3.19
    container_name: bank-insights-external-db-marker
    command: ["true"]
    restart: "no"

volumes:
  pgdata_prod:
